name: Bug report
description: Something isn't working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please check existing issues before filing a new one.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal `.tf` config and the exact command you ran.
      placeholder: |
        ```hcl
        # main.tf
        ```
        ```bash
        tflocal-gcp plan
        ```
    validations:
      required: true

  - type: textarea
    id: output
    attributes:
      label: Actual output / error
      render: text
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: tflocal-gcp version
      placeholder: "tflocal-gcp --version"
    validations:
      required: true

  - type: input
    id: localgcp_version
    attributes:
      label: localgcp version
      placeholder: "localgcp version"

  - type: input
    id: terraform_version
    attributes:
      label: Terraform version
      placeholder: "terraform version"

  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS, Linux, Windows]
    validations:
      required: true
