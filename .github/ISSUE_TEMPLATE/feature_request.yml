name: Feature request
description: Suggest a new service, flag, or behaviour.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        For a new service endpoint, include the localgcp port and the
        Terraform provider attribute name (e.g. `foo_custom_endpoint`).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this hasn't been requested before.
          required: true
        - label: >
            For a new service endpoint, I verified the localgcp port in the
            [localgcp docs](https://localgcp.com/docs/).
