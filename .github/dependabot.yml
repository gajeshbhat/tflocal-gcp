version: 2

updates:
  # Python runtime + dev dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "gajeshbhat"
    assignees:
      - "gajeshbhat"

  # GitHub Actions (ci.yml, release.yml, dco.yml)
  # Dependabot will propose updated SHA pins with version comments.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "gajeshbhat"
    assignees:
      - "gajeshbhat"
